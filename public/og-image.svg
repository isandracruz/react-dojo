<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&amp;family=Geist:wght@300;400&amp;display=swap');
  </style>
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.8" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="44%" r="40%">
      <stop offset="0%" stop-color="#61DAFB" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#61DAFB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0c0d"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Inset frame -->
  <rect x="28" y="28" width="1144" height="574" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.06" rx="2"/>

  <!-- Corner marks — top left -->
  <line x1="28" y1="28" x2="90" y2="28" stroke="#61DAFB" stroke-width="1.2" opacity="0.45"/>
  <line x1="28" y1="28" x2="28" y2="90" stroke="#61DAFB" stroke-width="1.2" opacity="0.45"/>

  <!-- Corner marks — top right -->
  <line x1="1172" y1="28" x2="1110" y2="28" stroke="#61DAFB" stroke-width="1.2" opacity="0.45"/>
  <line x1="1172" y1="28" x2="1172" y2="90" stroke="#61DAFB" stroke-width="1.2" opacity="0.45"/>

  <!-- Corner marks — bottom left -->
  <line x1="28" y1="602" x2="90" y2="602" stroke="#61DAFB" stroke-width="1.2" opacity="0.45"/>
  <line x1="28" y1="602" x2="28" y2="540" stroke="#61DAFB" stroke-width="1.2" opacity="0.45"/>

  <!-- Corner marks — bottom right -->
  <line x1="1172" y1="602" x2="1110" y2="602" stroke="#61DAFB" stroke-width="1.2" opacity="0.45"/>
  <line x1="1172" y1="602" x2="1172" y2="540" stroke="#61DAFB" stroke-width="1.2" opacity="0.45"/>

  <!-- Ghost origami — large, far left -->
  <g transform="translate(-20, 140) scale(13)" stroke="#61DAFB" fill="none" stroke-width="0.12" stroke-linecap="round" stroke-linejoin="round" opacity="0.04">
    <path d="M12 12V4a1 1 0 0 1 1-1h6.297a1 1 0 0 1 .651 1.759l-4.696 4.025"/>
    <path d="m12 21-7.414-7.414A2 2 0 0 1 4 12.172V6.415a1.002 1.002 0 0 1 1.707-.707L20 20.009"/>
    <path d="m12.214 3.381 8.414 14.966a1 1 0 0 1-.167 1.199l-1.168 1.163a1 1 0 0 1-.706.291H6.351a1 1 0 0 1-.625-.219L3.25 18.8a1 1 0 0 1 .631-1.781l4.165.027"/>
  </g>

  <!-- Ghost origami — small, far right -->
  <g transform="translate(980, 260) scale(6)" stroke="#61DAFB" fill="none" stroke-width="0.25" stroke-linecap="round" stroke-linejoin="round" opacity="0.05">
    <path d="M12 12V4a1 1 0 0 1 1-1h6.297a1 1 0 0 1 .651 1.759l-4.696 4.025"/>
    <path d="m12 21-7.414-7.414A2 2 0 0 1 4 12.172V6.415a1.002 1.002 0 0 1 1.707-.707L20 20.009"/>
    <path d="m12.214 3.381 8.414 14.966a1 1 0 0 1-.167 1.199l-1.168 1.163a1 1 0 0 1-.706.291H6.351a1 1 0 0 1-.625-.219L3.25 18.8a1 1 0 0 1 .631-1.781l4.165.027"/>
  </g>

  <!-- Main origami icon -->
  <g transform="translate(492, 92) scale(9)" stroke="#61DAFB" fill="none" stroke-width="0.17" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 12V4a1 1 0 0 1 1-1h6.297a1 1 0 0 1 .651 1.759l-4.696 4.025"/>
    <path d="m12 21-7.414-7.414A2 2 0 0 1 4 12.172V6.415a1.002 1.002 0 0 1 1.707-.707L20 20.009"/>
    <path d="m12.214 3.381 8.414 14.966a1 1 0 0 1-.167 1.199l-1.168 1.163a1 1 0 0 1-.706.291H6.351a1 1 0 0 1-.625-.219L3.25 18.8a1 1 0 0 1 .631-1.781l4.165.027"/>
  </g>

  <!-- Horizontal rules flanking divider -->
  <line x1="200" y1="322" x2="516" y2="322" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
  <circle cx="540" cy="322" r="1.5" fill="#61DAFB" opacity="0.5"/>
  <circle cx="600" cy="322" r="1.5" fill="#61DAFB" opacity="0.5"/>
  <circle cx="660" cy="322" r="1.5" fill="#61DAFB" opacity="0.5"/>
  <line x1="684" y1="322" x2="1000" y2="322" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- Title -->
  <text
    x="600" y="412"
    font-family="'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace"
    font-size="90"
    font-weight="500"
    fill="#ededed"
    text-anchor="middle"
    letter-spacing="-3"
  >React Dojo</text>

  <!-- Tagline -->
  <text
    x="600" y="476"
    font-family="'Geist', ui-sans-serif, system-ui, sans-serif"
    font-size="21"
    font-weight="300"
    fill="#4a4a50"
    text-anchor="middle"
    letter-spacing="1.5"
  >React se aprende practicando.</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="1.5" fill="#61DAFB" opacity="0.35"/>
  <!-- Bottom accent line -->
  <rect x="0" y="628.5" width="1200" height="1.5" fill="#61DAFB" opacity="0.35"/>
</svg>
